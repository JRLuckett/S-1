<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Logo 2: Periodic table element - red filled background, dark text -->
  <rect x="20" y="20" width="360" height="360" rx="24" ry="24" fill="#C0392B"/>
  <!-- Number "1" top-left -->
  <text x="58" y="92" font-family="Outfit, sans-serif" font-weight="600" font-size="48" fill="#0D0D0D">1</text>
  <!-- Large "S" centered -->
  <text x="200" y="260" font-family="Outfit, sans-serif" font-weight="700" font-size="200" fill="#0D0D0D" text-anchor="middle">S</text>
  <!-- "VENTURES" inside the box, near bottom -->
  <text x="200" y="365" font-family="Outfit, sans-serif" font-weight="400" font-size="42" fill="#0D0D0D" text-anchor="middle" letter-spacing="0.12em">VENTURES</text>
</svg>
